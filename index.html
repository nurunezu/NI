<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NI Collabo 360 マニュアル検索システム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f1f5f9; }
        .search-container { transition: all 0.3s ease; }
        .search-focused { box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.5); border-color: #3b82f6; }
        .result-card { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .highlight { background-color: #fef08a; font-weight: bold; padding: 0 2px; border-radius: 2px; }
    </style>
</head>
<body class="text-slate-800 min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-gradient-to-r from-blue-800 to-indigo-900 text-white py-12 shadow-md">
        <div class="container mx-auto px-4 text-center max-w-4xl">
            <h1 class="text-3xl md:text-4xl font-bold mb-4 tracking-tight"><i class="fas fa-book-open mr-3"></i>NI Collabo 360 設定FAQ検索</h1>
            <p class="text-blue-100 text-lg mb-8">システム設定マニュアル（全374P）から、知りたい設定の該当ページを検索します。</p>
            
            <!-- Search Bar -->
            <div class="relative w-full max-w-2xl mx-auto search-container bg-white rounded-full flex items-center p-2 border-2 border-transparent">
                <i class="fas fa-search text-slate-400 text-xl ml-4"></i>
                <input type="text" id="searchInput" 
                    class="w-full bg-transparent border-none outline-none px-4 py-3 text-lg text-slate-700 placeholder-slate-400" 
                    placeholder="例: 「ワークフロー 代理」「パスワード」「シングルサインオン」..."
                    autocomplete="off">
                <button id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full font-bold transition-colors flex items-center">
                    検索
                </button>
                <button id="clearBtn" class="absolute right-32 text-slate-400 hover:text-slate-600 hidden">
                    <i class="fas fa-times-circle"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        
        <!-- Search Status -->
        <div id="searchStatus" class="mb-6 text-slate-500 font-medium hidden flex justify-between items-end border-b border-slate-200 pb-2">
            <span id="searchCount"></span>
            <span class="text-xs text-slate-400"><i class="fas fa-file-pdf mr-1"></i>参照元: system_collabo.pdf</span>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="space-y-4">
            <!-- 初期状態のメッセージ -->
            <div class="text-center py-16 bg-white rounded-2xl border border-slate-200 shadow-sm" id="initialMessage">
                <div class="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-search text-blue-500 text-3xl"></i>
                </div>
                <h3 class="text-xl font-bold text-slate-700 mb-2">調べたいキーワードを入力してください</h3>
                <p class="text-slate-500 mb-6">マニュアル内の該当機能、設定方法、参照ページを即座にご案内します。</p>
                <div class="flex flex-wrap justify-center gap-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-wider mr-2 self-center">よく検索されるワード:</span>
                    <button class="suggest-btn bg-white border border-slate-300 text-slate-600 px-3 py-1 rounded-full text-sm hover:border-blue-400 hover:text-blue-600 transition">ポータル</button>
                    <button class="suggest-btn bg-white border border-slate-300 text-slate-600 px-3 py-1 rounded-full text-sm hover:border-blue-400 hover:text-blue-600 transition">代理申請</button>
                    <button class="suggest-btn bg-white border border-slate-300 text-slate-600 px-3 py-1 rounded-full text-sm hover:border-blue-400 hover:text-blue-600 transition">CSV</button>
                    <button class="suggest-btn bg-white border border-slate-300 text-slate-600 px-3 py-1 rounded-full text-sm hover:border-blue-400 hover:text-blue-600 transition">アクセス制限</button>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-slate-800 text-slate-300 py-6 text-center text-sm">
        <p>&copy; NI Collabo 360 System Manual Search DB (Offline Version)</p>
    </footer>

    <script>

                page: 178

            {

                description: "IoTセンサーからの情報を取得し、異常があった場合（一定時間動きがない等）に担当者や家族へ見守り通知を送るための設定です。",
                page: 358
            },
            {

                keywords: ["電帳法", "ストレージ", "電子帳簿保存法", "管理者", "通知"],
                description: "電子帳簿保存法に対応した書類保存機能の基本設定です。管理者指定や未確定書類の通知日数を設定します。",
                page: 364

        ];

        // --- DOM Elements ---
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultsContainer = document.getElementById('resultsContainer');
        const searchStatus = document.getElementById('searchStatus');
        const searchCount = document.getElementById('searchCount');
        const initialMessage = document.getElementById('initialMessage');
        const searchContainer = document.querySelector('.search-container');

        // --- Event Listeners ---
        searchInput.addEventListener('focus', () => searchContainer.classList.add('search-focused'));
        searchInput.addEventListener('blur', () => searchContainer.classList.remove('search-focused'));
        
        searchInput.addEventListener('input', () => {
            if(searchInput.value.length > 0) {
                clearBtn.classList.remove('hidden');
            } else {
                clearBtn.classList.add('hidden');
            }
        });

        clearBtn.addEventListener('click', () => {
            searchInput.value = '';
            searchInput.focus();
            clearBtn.classList.add('hidden');
            showInitialState();
        });

        searchBtn.addEventListener('click', executeSearch);
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') executeSearch();
        });

        document.querySelectorAll('.suggest-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                searchInput.value = e.target.textContent;
                clearBtn.classList.remove('hidden');
                executeSearch();
            });
        });

        // --- Search & UI Logic ---
        function executeSearch() {
            const query = searchInput.value.trim().toLowerCase();
            
            if (!query) {
                showInitialState();
                return;
            }

            const searchTerms = query.split(/\s+/);

            const results = manualDB.filter(item => {
                const searchText = `${item.title} ${item.description} ${item.keywords.join(' ')} ${item.category}`.toLowerCase();
                return searchTerms.every(term => searchText.includes(term));
            });

            renderResults(results, searchTerms);
        }

        function showInitialState() {
            resultsContainer.innerHTML = '';
            resultsContainer.appendChild(initialMessage);
            searchStatus.classList.add('hidden');
        }

        function highlightText(text, terms) {
            let highlighted = text;
            terms.forEach(term => {
                if (term.length > 0) {
                    // エスケープ処理（正規表現エラー防止）
                    const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const regex = new RegExp(`(${safeTerm})`, 'gi');
                    highlighted = highlighted.replace(regex, '<span class="highlight">$1</span>');
                }
            });
            return highlighted;
        }

        function renderResults(results, searchTerms) {
            resultsContainer.innerHTML = '';
            searchStatus.classList.remove('hidden');

            if (results.length === 0) {
                searchCount.innerHTML = `「<span class="font-bold text-slate-700">${searchInput.value}</span>」に一致するマニュアル項目は見つかりませんでした。`;
                resultsContainer.innerHTML = `
                    <div class="text-center py-12 bg-white rounded-xl border border-slate-200">
                        <i class="fas fa-search-minus text-slate-300 text-4xl mb-4"></i>
                        <p class="text-slate-500">別のキーワードを試すか、表記を変えてみてください。</p>
                    </div>
                `;
                return;
            }

            searchCount.innerHTML = `検索結果: <span class="font-bold text-blue-600 text-lg">${results.length}</span> 件`;

            results.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `result-card bg-white rounded-xl p-6 border border-slate-200 shadow-sm hover:shadow-md transition-shadow relative overflow-hidden`;
                card.style.animationDelay = `${index * 0.05}s`;

                const highlightedTitle = highlightText(item.title, searchTerms);
                const highlightedDesc = highlightText(item.description, searchTerms);

                card.innerHTML = `
                    <div class="absolute top-0 left-0 w-1 h-full bg-blue-500"></div>
                    <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
                        <div class="flex-grow">
                            <span class="inline-block px-2 py-1 bg-slate-100 text-slate-500 text-xs font-bold rounded mb-2">${item.category}</span>
                            <h3 class="text-xl font-bold text-blue-900 mb-2">${highlightedTitle}</h3>
                            <p class="text-slate-600 text-sm leading-relaxed mb-4">${highlightedDesc}</p>
                            <div class="flex flex-wrap gap-1">
                                ${item.keywords.slice(0, 5).map(kw => `<span class="text-xs text-slate-400 bg-slate-50 px-2 py-1 rounded">#${kw}</span>`).join('')}
                            </div>
                        </div>
                        <div class="md:w-48 flex-shrink-0 flex flex-col items-end justify-center">
                            <div class="text-slate-400 text-xs font-bold mb-1">マニュアル該当ページ</div>
                            <div class="text-3xl font-black text-slate-700 mb-3">P.${item.page}</div>
                            <a href="https://www.ni-consul.jp/ni_us/manual/ge/system/system_collabo.pdf#page=${item.page}" 
                               target="_blank" 
                               class="inline-flex items-center justify-center w-full bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 font-bold py-2 px-4 rounded-lg transition-colors">

                `;
